<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <rect width="100%" height="100%" fill="white"/>
  <g font-family="Times New Roman, Times, serif" font-size="28" fill="#111">
    <text x="40" y="70">y_c = { m/p^2 (2 p x - x^2), 0 &lt;= x &lt;= p</text>
    <text x="98" y="112">m/(1-p)^2 ((1-2p) + 2 p x - x^2), p &lt;= x &lt;= 1 }</text>
    <text x="40" y="182">y_t = 5 t (0.2969 sqrt(x) - 0.1260 x - 0.3516 x^2 + 0.2843 x^3 - 0.1015 x^4)</text>
  </g>
</svg>
